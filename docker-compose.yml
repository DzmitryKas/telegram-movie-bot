version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: movie-bot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: moviebot
      POSTGRES_PASSWORD: moviebot_password
      POSTGRES_DB: movie_bot
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
